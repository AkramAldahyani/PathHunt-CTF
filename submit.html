<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Flag — PathHunt CTF</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <div data-nav></div>

    <main class="submit-wrap">
      <div class="submit-card">
        <div class="section-label">&gt; submit.sh</div>
        <h1>Submit a flag</h1>
        <p class="lede">
          Paste any flag you've captured. The format is always
          <span class="inline-code">flag{...}</span>. Case matters.
        </p>

        <form id="submit-form" onsubmit="return false;">
          <div class="form-group">
            <label class="form-label" for="flag-input">Flag</label>
            <input
              type="text"
              id="flag-input"
              class="form-input"
              placeholder="flag{...}"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <button type="submit" class="btn-submit" id="submit-btn">
            Verify &amp; capture &rarr;
          </button>
          <div
            class="message"
            id="message"
            role="status"
            aria-live="polite"
          ></div>
        </form>

        <div class="score-bar" id="score-bar" style="display:none; margin-top: 28px; padding: 16px 20px; border: 1px solid rgba(255,255,255,0.07); font-family: var(--font-mono); font-size: 0.85rem; display: flex; gap: 32px; flex-wrap: wrap;">
          <span style="color: var(--text-dim)">Flags &nbsp;<strong id="sb-solved" style="color:var(--text)">0</strong> / 10</span>
          <span style="color: var(--text-dim)">Score &nbsp;<strong id="sb-score" style="color:var(--neon-green)">0</strong> pts</span>
          <span style="color: var(--text-dim)">Rank &nbsp;&nbsp;<strong id="sb-rank" style="color:var(--neon-blue)">Rookie</strong></span>
        </div>

        <div class="captured" id="captured" style="display: none">
          <h3>Your captured flags</h3>
          <div class="flag-list" id="flag-list"></div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>
        PathHunt CTF &middot; Flags are verified against SHA-256 hashes stored
        in your browser. <span style="color: var(--neon-green)">&#x25A0;</span>
      </p>
    </footer>

    <script src="assets/script.js"></script>
    <script>
      const form  = document.getElementById("submit-form");
      const input = document.getElementById("flag-input");
      const msg   = document.getElementById("message");
      const btn   = document.getElementById("submit-btn");

      let messageTimeout;

      function showMessage(text, type) {
        msg.textContent = text;
        msg.className = "message show " + type;

        clearTimeout(messageTimeout);
        messageTimeout = setTimeout(hideMessage, 3000);
      }

      function hideMessage() {
        clearTimeout(messageTimeout);
        msg.className = "message";
      }

      function getRank(n) {
        if (n >= 10) return "Legend";
        if (n >= 7)  return "Hacker";
        if (n >= 4)  return "Scout";
        if (n >= 1)  return "Initiate";
        return "Rookie";
      }

      function renderAll() {
        const progress   = getProgress();
        const solvedCount = progress.solved.length;
        const total      = PATHHUNT.challenges.length;

        // Score bar
        const bar = document.getElementById("score-bar");
        bar.style.display = "flex";
        document.getElementById("sb-solved").textContent = solvedCount;
        document.getElementById("sb-score").textContent  = progress.score.toLocaleString();
        document.getElementById("sb-rank").textContent   = getRank(solvedCount);

        // Captured flags list
        const wrap = document.getElementById("captured");
        const list = document.getElementById("flag-list");
        list.innerHTML = "";

        if (solvedCount === 0) { wrap.style.display = "none"; return; }
        wrap.style.display = "block";

        PATHHUNT.challenges.forEach((ch) => {
          if (!progress.solved.includes(ch.hash)) return;
          const el = document.createElement("div");
          el.className = "flag-item";
          el.innerHTML = `
            <span class="check">✓</span>
            <span style="color:var(--text-dim);font-size:0.78rem;min-width:90px;">CH ${String(ch.id).padStart(2,"0")}</span>
            <span style="flex:1">${ch.name}</span>
            <span style="color:var(--neon-blue);font-size:0.78rem;">+${ch.points}</span>
          `;
          list.appendChild(el);
        });

        // Completion screen on final flag submission
        if (solvedCount === total && !localStorage.getItem('pathhunt_completed')) {
          localStorage.setItem('pathhunt_completed', '1');
          setTimeout(() => showCompletionScreen(progress.score), 800);
        }
      }

      async function handleSubmit() {
        const val = input.value.trim();
        if (!val) return;

        hideMessage();
        btn.disabled = true;
        btn.textContent = "Verifying...";

        const result = await verifyFlag(val);

        if (!result) {
          showMessage("✗ Invalid flag. Check the format: flag{...}", "error");
          btn.disabled = false;
          btn.textContent = "Verify & capture →";
          return;
        }

        const { challenge: ch, hash } = result;
        const { already } = markSolvedByHash(hash);

        if (already) {
          showMessage(`◆ Already captured — "${ch.name}" is in your collection.`, "warn");
        } else {
          showMessage(`✓ Flag accepted! "${ch.name}" solved. +${ch.points} points.`, "success");
          showToast("Flag captured: " + ch.name, "success");
        }

        input.value = "";
        btn.disabled = false;
        btn.textContent = "Verify & capture →";
        renderAll();
      }

      form.addEventListener("submit", handleSubmit);
      renderAll();
    </script>
  </body>
</html>
